name: Setup Friends Env

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Create Realtime SFU app and set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          NAME="tslap-friends"
          CREATE=$(curl -sS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${NAME}\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/calls/apps")

          if ! echo "$CREATE" | jq -e '.success == true' >/dev/null; then
            NAME="tslap-friends-$(date +%Y%m%d%H%M%S)"
            CREATE=$(curl -sS -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${NAME}\"}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/calls/apps")
          fi

          echo "$CREATE" | jq .
          echo "$CREATE" | jq -e '.success == true' >/dev/null
          APP_ID=$(echo "$CREATE" | jq -r '.result.uid')
          APP_SECRET=$(echo "$CREATE" | jq -r '.result.secret')
          echo "::add-mask::${APP_SECRET}"
          echo "Calls app ${NAME}: ${APP_ID}"

          npm i -g wrangler@4
          printf '%s' "$APP_ID" | wrangler secret put CALLS_APP_ID --name worker-tslaapp
          printf '%s' "$APP_SECRET" | wrangler secret put CALLS_APP_SECRET --name worker-tslaapp
          echo "CALLS_APP_ID=${APP_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "Secrets CALLS_APP_ID + CALLS_APP_SECRET set on worker-tslaapp"
